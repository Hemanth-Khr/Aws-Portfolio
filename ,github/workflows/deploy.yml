name: Deploy Portfolio to AWS

on:
  push:
    branches:
      - main  # Triggers deployment whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the source code from your GitHub repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Configure your AWS credentials using repository secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Change this if your S3 bucket is in another region

    # 3. Synchronize your portfolio files directly to your target S3 bucket
    - name: Deploy Static Site to AWS S3
      run: |
        aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET_NAME }} \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --delete

    # 4. Invalidate CloudFront cache so changes appear instantly worldwide
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
